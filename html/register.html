<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | CodeMaster Academy</title>

    <link rel="stylesheet" href="C:\Users\HomePC\Downloads\DLG Academy\css\auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="left">

        <h1>Join CodeMaster Academy</h1>

        <p>
            Create your free account and start learning programming from beginner to professional.
        </p>

    </div>

    <div class="right">

        <form id="registerForm">

            <h2>Create Account</h2>

            <input type="text" id="fullname" placeholder="Full Name" required>

            <input type="email" id="email" placeholder="Email Address" required>

            <input type="password" id="password" placeholder="Password" required>

            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <button type="submit">
                Create Account
            </button>

            <p id="authMessage" class="auth-message"></p>

            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>

</div>

<script src="C:\Users\HomePC\Downloads\DLG Academy\script\register.js"></script>

</body>
</html>
